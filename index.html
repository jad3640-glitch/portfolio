<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Architect | Legacy x AI Execution</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@800;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #CCFF00; /* 네온 라임 */
            --text-main: #FFFFFF;
            --text-dim: #999999;
            --tag-bg: #CCFF00; /* 태그 배경색 */
            --tag-text: #000000; /* 태그 글자색 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6;
            word-break: keep-all;
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 100%;
            background-attachment: fixed;
        }

        /* NAVIGATION */
        nav {
            padding: 30px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 100;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: 'Urbanist', sans-serif; font-weight: 900; color: var(--accent); font-size: 1.2rem; text-transform: uppercase; }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 30px; font-size: 0.9rem; font-weight: 700; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            margin-top: 50px;
        }
        
        .badge {
            background: rgba(26, 26, 26, 0.5);
            color: var(--accent);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 30px;
            border: 1px solid rgba(204, 255, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero h1 {
            font-family: 'Inter', sans-serif;
            font-size: clamp(2.8rem, 7vw, 4.8rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 35px;
            text-shadow: 0 0 20px rgba(204, 255, 0, 0.2);
        }
        .hero h1 span { color: var(--accent); }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-dim);
            max-width: 850px;
            margin-bottom: 70px;
            word-break: keep-all;
        }

        /* FLOATING TAGS */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
        }
        
        .tag {
            background-color: var(--tag-bg);
            color: var(--tag-text);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 800;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
            cursor: default;
            display: inline-block;
        }

        .tag:nth-child(1) { transform: rotate(-5deg); }
        .tag:nth-child(2) { transform: rotate(3deg); }
        .tag:nth-child(3) { transform: rotate(-2deg); }
        .tag:nth-child(4) { transform: rotate(4deg); }
        .tag:nth-child(5) { transform: rotate(-3deg); }
        .tag:nth-child(6) { transform: rotate(2deg); }

        .tag:hover {
            transform: rotate(0deg) scale(1.1) !important;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.5);
            z-index: 10;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .tag { padding: 10px 20px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Brand Architect.</div>
        <div class="nav-links">
            <a href="about/index.html">ABOUT</a>
            <a href="#projects">PROJECTS</a>
            <a href="#contact">CONTACT</a>
        </div>
    </nav>

    <section class="hero">
        <div class="badge">Legacy x AI Execution</div>
        <h1>20년의 브랜드 설계,<br><span>AI로 완성하는 실행의 속도.</span></h1>
        <p>
            웹디자인, 브랜딩, 통합 기획의 깊은 내공을 바탕으로<br>
            AI 도구를 활용해 비즈니스의 스케일업을 설계하는 브랜드 아키텍트입니다.
        </p>
        
        <div class="tag-container">
            <div class="tag">Gemini & AI Automation</div>
            <div class="tag">Vibe Coding (Cursor)</div>
            <div class="tag">Brand Strategy</div>
            <div class="tag">Integrated Marketing</div>
            <div class="tag">Web & Visual Design</div>
            <div class="tag">Total Brand Management</div>
        </div>
    </section>

</body>
</html>
